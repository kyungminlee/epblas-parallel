name: CI (fuzz)

# Per-push / per-PR correctness gate. The release workflow only runs the
# fuzz suite at tag time with a single time-based random seed, so harness
# and kernel regressions stay latent between releases (e.g. the edot
# operand-norm-floor regression that slipped in at the rename/split and
# only surfaced, probabilistically, at a release). This workflow closes
# that gap: it runs `ctest -L lint` (static source guards) then `ctest -L
# fuzz` on every push to main/develop and on every PR, across BOTH
# compilers and a fixed rotating set of seeds so any failure is
# deterministically reproducible from its logged seed.

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:
    inputs:
      eplinalg_tag:
        description: 'eplinalg release tag for the reference archives (overrides the pinned default)'
        required: false
      seeds:
        description: 'Space-separated fuzz seeds to run (overrides the pinned rotation)'
        required: false

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    # Fail fast on a stuck runner. A healthy job (apt + Intel MPI install +
    # build + the whole seed rotation) lands around ~12 min; without a cap a
    # stalled ctest step spins to GitHub's 6h default before it's noticed.
    # Cap sits above the ctest step guard (below) with room for the ~5 min
    # setup+build preamble, so a contended runner fails at the step, not here.
    timeout-minutes: 40
    env:
      # Fixed, reproducible seed rotation. Each value runs the whole fuzz
      # suite; on failure the driver prints `seed=<N>` so you reproduce it
      # locally with `BLAS_FUZZ_SEED=<N> ctest -L fuzz`. Add seeds here to
      # widen deterministic coverage; the release workflow's random seed
      # adds breadth on top of this fixed floor. (Case count per driver is
      # pinned at 200 by each test's ctest ENVIRONMENT property, which
      # overrides any inherited BLAS_FUZZ_CASES — so it isn't set here.)
      FUZZ_SEEDS: ${{ inputs.seeds || '1 7 42 1234 20240617' }}
    strategy:
      fail-fast: false
      matrix:
        compiler:
          - { name: gfortran-12, fc: gfortran-12, cc: gcc-12, cxx: g++-12, pkg: gcc-12 g++-12 gfortran-12 }
          - { name: gfortran-15, fc: gfortran-15, cc: gcc-15, cxx: g++-15, pkg: gcc-15 g++-15 gfortran-15 }

    steps:
      - uses: actions/checkout@v6

      # Toolchain + migrated-reference provisioning (GCC, fypp, Intel MPI,
      # oneAPI env, eplinalg reference archives with download retry) is
      # shared verbatim with the release workflow via this composite
      # action — edit .github/actions/setup-epblas-env/action.yml, not
      # here. The fuzz drivers compare the overlay against the migrated
      # netlib reference, which ships in eplinalg's intelmpi archives.
      # The eplinalg tag defaults to the EPLINALG_BASELINE_VERSION pin in
      # cmake/FetchEplinalgBaseline.cmake unless overridden by dispatch.
      - name: Setup toolchain + eplinalg reference
        uses: ./.github/actions/setup-epblas-env
        with:
          compiler-name: ${{ matrix.compiler.name }}
          compiler-packages: ${{ matrix.compiler.pkg }}
          fc: ${{ matrix.compiler.fc }}
          cc: ${{ matrix.compiler.cc }}
          cxx: ${{ matrix.compiler.cxx }}
          eplinalg-tag: ${{ inputs.eplinalg_tag }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_Fortran_COMPILER=${{ matrix.compiler.fc }} \
            -DCMAKE_C_COMPILER=${{ matrix.compiler.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.compiler.cxx }} \
            -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run ctest (lint)
        # Static-source guards (label "lint"): the int-is-boundary-only rule
        # (epblas_parallel_int_boundary_guard) and any sibling checks. Seed-
        # independent, so runs once ahead of the fuzz rotation. Fast (~1 min);
        # a regression here means a bare `int` slipped into an overlay kernel.
        timeout-minutes: 5
        run: ctest --test-dir build -j$(nproc) --output-on-failure -L lint

      - name: Run ctest (fuzz) across the seed rotation
        # Healthy the whole 5-seed rotation runs in ~5-10 min (the slower
        # gfortran-15 leg is near the top of that). 25 min absorbs a
        # contended runner — one full rotation blew past 15 min once — while
        # still tripping a genuinely hung fuzz process well before the job cap.
        timeout-minutes: 25
        run: |
          rc=0
          for seed in $FUZZ_SEEDS; do
            echo "::group::fuzz seed=$seed (${{ matrix.compiler.name }})"
            if ! BLAS_FUZZ_SEED="$seed" \
                ctest --test-dir build -j$(nproc) --output-on-failure -L fuzz; then
              echo "::error::fuzz failed at seed=$seed (${{ matrix.compiler.name }}); reproduce with BLAS_FUZZ_SEED=$seed ctest -L fuzz"
              rc=1
            fi
            echo "::endgroup::"
          done
          exit $rc

      - name: Upload ctest log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ctest-${{ matrix.compiler.name }}-LastTest
          path: |
            build/Testing/Temporary/LastTest.log
            build/Testing/Temporary/LastTestsFailed.log
          retention-days: 7
