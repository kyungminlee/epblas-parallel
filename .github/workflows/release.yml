name: Release Libraries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v0.1.0)'
        required: false
      eplinalg_tag:
        description: 'eplinalg release tag for the test slot (overrides the pinned default)'
        required: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ── Build matrix: compiler (all 3 targets build per configure) ───
  build:
    runs-on: ubuntu-latest
    # Fail fast on a stuck runner (a healthy build+test slot is ~12 min);
    # without a cap a stalled ctest step spins to GitHub's 6h default. Cap
    # sits above the ctest step guard (below) with room for the build+package
    # preamble, so a contended runner fails at the step, not here.
    timeout-minutes: 40
    env:
      # The gfortran-15 slot also runs ctest as the release workflow's
      # one correctness signal. We pick gfortran-15 because it's the
      # newer of the two and exercises the same compiler tag that
      # eplinalg's own release matrix tests against. The test slot
      # pulls the matching kind10 / kind16 / multifloats eplinalg
      # archives so all three overlay targets contribute to ctest -L
      # fuzz. Extending coverage to gfortran-12 is a known follow-up.
      IS_TEST_SLOT: ${{ matrix.compiler.name == 'gfortran-15' }}
    strategy:
      fail-fast: false
      matrix:
        # v0.1.0 release matrix: gfortran-only. Intel ifx and LLVM
        # Flang need targeted fixes for the OpenMP C runtime + the
        # C99 `_Complex long double` intrinsics the overlay kernels
        # use before they can be promoted. Tracked as a follow-up.
        compiler:
          - { name: gfortran-12, fc: gfortran-12, cc: gcc-12, cxx: g++-12, pkg: gcc-12 g++-12 gfortran-12 }
          - { name: gfortran-15, fc: gfortran-15, cc: gcc-15, cxx: g++-15, pkg: gcc-15 g++-15 gfortran-15 }

    steps:
      - uses: actions/checkout@v6

      # Toolchain + migrated-reference provisioning (GCC, fypp, and — for
      # the test slot only — Intel MPI, oneAPI env, eplinalg reference
      # archives with download retry) is shared verbatim with ci.yml via
      # this composite action — edit
      # .github/actions/setup-epblas-env/action.yml, not here. intelmpi is
      # the canonical MPI for the migrated stack (mirrors eplinalg's own
      # release workflow). The eplinalg tag is pinned to the release we
      # tested against: it defaults to the EPLINALG_BASELINE_VERSION pin
      # in cmake/FetchEplinalgBaseline.cmake — bump it there on every
      # epblas-parallel release that ships against a newer eplinalg, so
      # the test slot stays reproducible and the dependency surfaces in
      # PR review.
      - name: Setup toolchain + eplinalg reference
        uses: ./.github/actions/setup-epblas-env
        with:
          compiler-name: ${{ matrix.compiler.name }}
          compiler-packages: ${{ matrix.compiler.pkg }}
          fc: ${{ matrix.compiler.fc }}
          cc: ${{ matrix.compiler.cc }}
          cxx: ${{ matrix.compiler.cxx }}
          eplinalg-tag: ${{ inputs.eplinalg_tag }}
          install-reference: ${{ env.IS_TEST_SLOT }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_Fortran_COMPILER=${{ matrix.compiler.fc }} \
            -DCMAKE_C_COMPILER=${{ matrix.compiler.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.compiler.cxx }} \
            -DBUILD_TESTING=${{ env.IS_TEST_SLOT == 'true' && 'ON' || 'OFF' }} \
            -DEPBLAS_PARALLEL_MARCH=sandybridge \
            -DEPBLAS_OPENBLAS_MARCH=sandybridge \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run ctest (lint)
        # Static-source guards (label "lint"): the int-is-boundary-only rule
        # (epblas_parallel_int_boundary_guard) and siblings. Only the test
        # slot builds the ctest tree; fast (~1 min), gates the release.
        if: env.IS_TEST_SLOT == 'true'
        timeout-minutes: 5
        run: ctest --test-dir build -j$(nproc) --output-on-failure -L lint

      - name: Run ctest (fuzz)
        # `-L fuzz` is the everyday correctness gate (~15s per target)
        # per CMakePresets.json. Heavier presets (bench / perf / sweep)
        # take minutes-to-hours and don't belong in the release loop.
        if: env.IS_TEST_SLOT == 'true'
        # Single default seed is ~25s healthy; 20 min absorbs a contended
        # runner (a rotation has blown past 15 min once) while still
        # tripping a genuinely hung run well before the job cap.
        timeout-minutes: 20
        run: ctest --test-dir build -j$(nproc) --output-on-failure -L fuzz

      - name: Upload ctest log on failure
        if: failure() && env.IS_TEST_SLOT == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ctest-${{ matrix.compiler.name }}-LastTest
          path: |
            build/Testing/Temporary/LastTest.log
            build/Testing/Temporary/LastTestsFailed.log
          retention-days: 7

      - name: Install
        run: cmake --install build

      - name: Package
        run: |
          cd install
          ARCHIVE="epblas-parallel-${{ matrix.compiler.name }}-linux-x86_64"
          tar czf ${{ github.workspace }}/${ARCHIVE}.tar.gz .
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARCHIVE }}
          path: ${{ env.ARCHIVE }}.tar.gz
          retention-days: 7

  # ── Create GitHub Release ────────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    # Pure download + repackage + publish; a healthy run is ~1 min.
    timeout-minutes: 15
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/
          pattern: 'epblas-parallel-*-linux-x86_64'

      - name: Collect tarballs
        run: |
          mkdir -p release
          find artifacts -name '*.tar.gz' -exec cp {} release/ \;
          ls -la release/

      - name: Build combined epblas-parallel tarball
        # Merge every per-compiler tarball into one
        # ``epblas-parallel-vX.Y.Z-linux-x86_64`` archive — same shape
        # as eplinalg's combined tarball. Library names are UNTAGGED
        # (pure-C/C++ archives per the eplinalg convention), so the
        # per-compiler extracts fully overlap; the same C sources built
        # by a different GCC are interchangeable deliverables, and the
        # alphabetically-last extract (the newest GCC slot) wins —
        # matching how eplinalg merges its own untagged libs
        # (``libeypblas.a``, ``libmultifloats.a``).
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="epblas-parallel-v${VERSION}-linux-x86_64"
          mkdir -p combined
          for t in release/*.tar.gz; do
            echo "  extracting $(basename "$t")"
            tar -xzf "$t" -C combined
          done
          tar -czf "release/${ARCHIVE}.tar.gz" -C combined .
          ls -lh "release/${ARCHIVE}.tar.gz"

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: release/*.tar.gz
          generate_release_notes: true
          body: |
            ## epblas-parallel: hand-written extended-precision BLAS overlays

            Pre-built static libraries for Linux x86-64.

            ### Combined archive

            ``epblas-parallel-vX.Y.Z-linux-x86_64.tar.gz`` merges the
            per-compiler archives into a single install tree. Library
            files follow the eplinalg naming convention: two-letter
            (real+complex) type prefix and no compiler tag —
            ``libeyblas_parallel.a``, ``libqxblas_parallel.a``,
            ``libmwblas_parallel.a`` (cf. eplinalg's
            ``libeyblas-gfortran-15.a``). No tag because the overlays
            are pure C/C++: they implement the gfortran BLAS ABI but
            contain no Fortran-compiled objects, so any archive links
            against any consumer toolchain. In the merged tree the
            newest GCC slot's archives win; use a per-compiler tarball
            if you want the overlays built by a specific GCC.

            ### Packages (per archive)

            | Package | Imported targets | Role |
            |---------|-----------------|------|
            | `epblas-parallel` | `epblas-parallel::{ey,qx,mw}blas` (composite, INTERFACE), `epblas-parallel::{ey,qx,mw}blas_parallel` (raw STATIC) | Production OpenMP-parallel overlay. The composite WHOLE_ARCHIVE-wraps the overlay so its symbols win at link time over any chained reference BLAS. |
            | `epblas-openblas` | `epblas-openblas::{ey,qx,mw}blas` (STATIC) | OpenBLAS-derived reference archives. Never wired into the composite — A/B comparison surface only. |

            ### Targets

            | Target | Description | Routine prefixes | Library file |
            |--------|-------------|------------------|--------------|
            | `kind10` | 80-bit extended precision (`long double` / `_Complex long double`) | `e` / `y` | `libeyblas_*.a` |
            | `kind16` | 128-bit quad precision (`__float128`) | `q` / `x` | `libqxblas_*.a` |
            | `multifloats` | Double-double (`float64x2`) | `m` / `w` | `libmwblas_*.a` |

            ### Compilers

            | Compiler | Per-compiler tarball |
            |----------|----------------------|
            | GCC/gfortran 12 | `epblas-parallel-gfortran-12-…` |
            | GCC/gfortran 15 | `epblas-parallel-gfortran-15-…` |

            Intel oneAPI (ifx) and LLVM Flang are not yet covered by
            the release matrix — the overlay kernels lean on GCC-style
            `_Complex long double` codegen and the OpenMP C runtime
            that those toolchains don't yet ship at parity. Tracked as
            a follow-up.

            ### Installation

            ```bash
            tar xzf epblas-parallel-v${VERSION}-linux-x86_64.tar.gz -C /usr/local
            ```

            Consumers reach the overlay via
            `find_package(epblas-parallel)` + linking
            `epblas-parallel::eyblas` (or `qxblas` / `mwblas`). The
            composite already pulls in `OpenMP::OpenMP_C` (and
            `OpenMP::OpenMP_CXX` when the multifloats target is
            present) on the consumer's link line.

            The OpenBLAS reference is reached via
            `find_package(epblas-openblas)` + linking
            `epblas-openblas::eyblas`.

            ### Test slot

            The `gfortran-15` slot additionally runs `ctest -L lint`
            (static source guards, incl. the int-is-boundary-only rule)
            and `ctest -L fuzz` against the matching `eplinalg` release
            archives (eyblas / qxblas / mwblas, intelmpi flavor — same
            combo eplinalg's own release uses as its correctness signal).
            These are the release workflow's only correctness signals —
            heavier benches and perf sweeps are out of band.
